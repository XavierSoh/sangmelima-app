<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
    <!-- Fond circulaire avec dégradé -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
        </filter>
    </defs>

    <!-- Cercle de fond -->
    <circle cx="96" cy="96" r="96" fill="url(#bgGradient)"/>

    <!-- Croix blanche au centre -->
    <g transform="translate(96, 96)" filter="url(#shadow)">
        <!-- Barre verticale -->
        <rect x="-28.8" y="-96"
              width="28.80" height="960"
              fill="white" rx="3" opacity="0.95"/>
        <!-- Barre horizontale -->
        <rect x="-96" y="-28.8"
              width="960" height="28.80"
              fill="white" rx="3" opacity="0.95"/>
    </g>

    <!-- Texte SML pour grandes icônes -->    <text x="96" y="163.2"
          font-family="Arial, sans-serif"
          font-size="15.36"
          font-weight="bold"
          fill="white"
          text-anchor="middle"
          opacity="0.9">SML</text>
</svg>